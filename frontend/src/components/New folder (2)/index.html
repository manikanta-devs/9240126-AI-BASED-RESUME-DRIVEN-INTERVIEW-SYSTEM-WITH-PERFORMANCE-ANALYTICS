<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A 3D Love Story</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="bg"></canvas>

    <main>
        <section>
            <h1>Once upon a time...</h1>
            <p>Two wandering souls existed in the vast digital cosmos.</p>
        </section>

        <section>
            <h2>They were worlds apart.</h2>
            <p>But they were drawn to the same mysterious gravity.</p>
        </section>

        <section>
            <h2>The closer they got...</h2>
            <p>The brighter their universe became.</p>
        </section>

        <section>
            <h2>Until finally...</h2>
            <p>Their orbits aligned perfectly. 💖</p>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
